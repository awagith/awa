<div id="searchsuite-autocomplete"
     class="searchsuite-autocomplete awa-ac"
     data-bind="visible: showPopup(),
                css: {
                    'awa-ac--has-results': anyResultCount(),
                    'awa-ac--has-query': hasQuery(),
                    'awa-ac--discovery-state': shouldShowDiscovery(),
                    'awa-ac--loading': isSearching()
                }"
     role="listbox"
     aria-label="Resultados da busca">

    <div class="awa-ac-loading-bar" data-bind="visible: isSearching()" aria-hidden="true"></div>

    <div class="awa-ac-discovery" data-bind="visible: shouldShowDiscovery()" aria-label="Sugestoes de busca">
        <div class="awa-ac-discovery-intro">
            <div class="awa-ac-section-title awa-ac-section-title--discovery">
                talvez voce procure por...
            </div>
            <p class="awa-ac-discovery-copy">
                atalhos rapidos para as buscas mais comuns da loja.
            </p>
        </div>

        <!-- ko if: recentSearches().length > 0 -->
        <div class="awa-ac-recent--discovery">
            <div class="awa-ac-section-title awa-ac-section-title--recent">
                Buscas recentes
                <button class="awa-ac-clear-recent" type="button"
                        data-bind="click: clearRecentSearches"
                        title="Limpar buscas recentes">Limpar</button>
            </div>
            <div class="awa-ac-chips" data-bind="foreach: recentSearches">
                <a class="awa-ac-chip" href="#"
                   data-bind="click: $parent.clickRecentSearch.bind($parent)"
                   role="option">
                    <svg class="awa-ac-chip-icon" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
                        <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 1.2A5.8 5.8 0 1 1 2.2 8 5.8 5.8 0 0 1 8 2.2zm-.4 2.3v4l3.2 1.9.6-1-2.6-1.6V4.5h-1.2z" fill="currentColor"/>
                    </svg>
                    <span data-bind="text: term"></span>
                </a>
            </div>
        </div>
        <!-- /ko -->

        <div class="awa-ac-keywords-section">
            <div class="awa-ac-section-title">Mais buscados</div>
            <ol class="awa-ac-keywords" data-bind="foreach: popularKeywords">
                <li class="awa-ac-keywords-item">
                    <a class="awa-ac-keywords-link" href="#"
                       data-bind="click: $parent.clickKeyword.bind($parent),
                                  attr: { id: 'awa-ac-item-' + $index() },
                                  css: { 'awa-ac-nav-active': $parent.navIndex() === $index() }"
                       role="option">
                        <span data-bind="text: term"></span>
                    </a>
                </li>
            </ol>
        </div>
    </div>

    <div class="awa-ac-results" data-bind="visible: hasQuery() && anyResultCount()">
        <div class="awa-ac-wrap">
            <div class="awa-ac-left" data-bind="visible: result.suggest.data().length > 0">
                <div class="awa-ac-suggest">
                    <div class="awa-ac-section-title">
                        Sugestoes
                        <span class="awa-ac-count" data-bind="visible: result.suggest.data().length > 0">
                            (<span data-bind="text: result.suggest.data().length"></span>)
                        </span>
                    </div>
                    <ul data-bind="foreach: result.suggest.data">
                        <li>
                            <a data-bind="attr: { href: url, title: title, id: 'awa-ac-item-' + $index() },
                                          css: { 'awa-ac-nav-active': $parent.navIndex() === $index() }">
                                <svg class="awa-ac-icon-search" viewBox="0 0 20 20" width="14" height="14" aria-hidden="true">
                                    <path d="M8.5 3a5.5 5.5 0 0 1 4.383 8.823l3.896 3.9a.75.75 0 0 1-1.06 1.06l-3.9-3.896A5.5 5.5 0 1 1 8.5 3zm0 1.5a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" fill="currentColor"/>
                                </svg>
                                <span data-bind="html: $parent.highlightMatch(title)"></span>
                                <span class="awa-ac-suggest-count" data-bind="text: '(' + num_results + ')' "></span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="awa-ac-right" data-bind="visible: result.product.data().length > 0">
                <div class="awa-ac-section-title">
                    Produtos
                    <a class="awa-ac-see-all" data-bind="attr: { href: result.product.url }">
                        Ver Todos (<span data-bind="text: result.product.size"></span>)
                    </a>
                </div>
                <ul class="awa-ac-products" data-bind="foreach: result.product.data">
                    <li class="awa-ac-product-item"
                        data-bind="attr: { id: 'awa-ac-item-' + ($parent.result.suggest.data().length + $index()) },
                                   css: { 'awa-ac-nav-active': $parent.navIndex() === ($parent.result.suggest.data().length + $index()) }">
                        <a class="awa-ac-product-image" data-bind="attr: { href: url, title: name }, visible: image">
                            <img data-bind="attr: { src: image, alt: name }" loading="lazy" />
                        </a>
                        <div class="awa-ac-product-info" data-bind="css: { 'awa-ac-noimage': !image }">
                            <a class="awa-ac-product-name" data-bind="attr: { href: url, title: name }, html: $parent.highlightMatch(name)"></a>
                            <!-- ko;
                                SKU: <span data-bind="text: sku"></span>
                            </div>
                            <div class="awa-ac-product-price" data-bind="html: price, visible: price"></div>
                            <!-- ko; if: add_to_cart -->
                            <form data-role="searchsuiteautocomplete-tocart-form"
                                  data-bind="attr: { action: add_to_cart.formUrl }"
                                  method="post">
                                <input type="hidden" name="product" data-bind="value: add_to_cart.productId" />
                                <input type="hidden" name="form_key" data-bind="value: $parents[1].formKey" />
                                <input type="hidden" data-bind="attr: { name: add_to_cart.paramNameUrlEncoded, value: add_to_cart.urlEncoded }" />
                                <button type="submit" class="awa-ac-addtocart" title="Adicionar ao Carrinho">
                                    <svg viewBox="0 0 20 20" width="14" height="14" aria-hidden="true">
                                        <path d="M4 2h1.5l.5 2h11l-2 7H6.5L4 2zm2.5 11a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm8 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" fill="currentColor"/>
                                    </svg>
                                </button>
                            </form>
                            <!-- /ko -->
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <div class="awa-ac-no-result" data-bind="visible: hasQuery() && !anyResultCount()">
        <svg viewBox="0 0 20 20" width="20" height="20" aria-hidden="true">
            <path d="M8.5 3a5.5 5.5 0 0 1 4.383 8.823l3.896 3.9a.75.75 0 0 1-1.06 1.06l-3.9-3.896A5.5 5.5 0 1 1 8.5 3zm0 1.5a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" fill="currentColor"/>
        </svg>
        Nenhum resultado encontrado
    </div>

</div>

<script>
require(['jquery', 'Magento_Customer/js/customer-data'], function ($, customerData) {
    'use strict';

    $(document).on('submit', '[data-role="searchsuiteautocomplete-tocart-form"]', function (e) {
        e.preventDefault();
        var form = $(this),
            btn = form.find('button[type="submit"]'),
            orig = btn.html(),
            formKey = $('input[name="form_key"]').first().val();

        if (!form.find('input[name="form_key"]').val() && formKey) {
            form.find('input[name="form_key"]').val(formKey);
        }

        btn.prop('disabled', true).html('<span class="awa-ac-adding">Adicionando...</span>');

        $.ajax({
            url: form.attr('action'),
            data: form.serialize(),
            type: 'post',
            dataType: 'json',
            success: function () {
                btn.html('<span class="awa-ac-added">Adicionado &#10003;</span>');
                customerData.reload(['cart'], true);
                setTimeout(function () {
                    btn.prop('disabled', false).html(orig);
                }, 3000);
            },
            error: function () {
                btn.html('<span class="awa-ac-add-error">Erro</span>');
                setTimeout(function () {
                    btn.prop('disabled', false).html(orig);
                }, 3000);
            }
        });
    });
})
</script>
