<!--
/**
 * Template do método de pagamento "A Combinar"
 */
-->
<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"/>
        <label data-bind="attr: {'for': getCode()}" class="label">
            <span data-bind="text: getTitle()"></span>
            <span class="payment-icon payment-icon-acombinar">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </span>
        </label>
    </div>
    <div class="payment-method-content" data-bind="visible: isChecked() == getCode()">
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!-- /ko -->
        </div>
        
        <div class="acombinar-info">
            <div class="acombinar-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2196F3" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v-4"/>
                    <path d="M12 8h.01"/>
                </svg>
            </div>
            <div class="acombinar-message">
                <h4 data-bind="i18n: 'Pagamento A Combinar'"></h4>
                <p data-bind="text: getInstructions()"></p>
                <ul class="acombinar-steps">
                    <li data-bind="i18n: '1. Finalize seu pedido normalmente'"></li>
                    <li data-bind="i18n: '2. Nossa equipe entrará em contato'"></li>
                    <li data-bind="i18n: '3. Combinaremos a melhor forma de pagamento'"></li>
                    <li data-bind="i18n: '4. Seu pedido será processado após confirmação'"></li>
                </ul>
            </div>
        </div>

        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="submit"
                        data-bind="click: placeOrder, attr: {title: $t('Finalizar Pedido')}, css: {disabled: !isPlaceOrderActionAllowed()}, enable: (getCode() == isChecked())">
                    <span data-bind="i18n: 'Finalizar Pedido'"></span>
                </button>
            </div>
        </div>
    </div>
</div>

<style>
.acombinar-info {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 20px;
    background: #f5f9ff;
    border-radius: 8px;
    margin: 15px 0;
    border-left: 4px solid #2196F3;
}
.acombinar-icon {
    flex-shrink: 0;
}
.acombinar-message h4 {
    margin: 0 0 10px 0;
    color: #1976D2;
    font-size: 16px;
}
.acombinar-message p {
    margin: 0 0 15px 0;
    color: #555;
}
.acombinar-steps {
    margin: 0;
    padding-left: 20px;
    color: #666;
}
.acombinar-steps li {
    margin-bottom: 5px;
}
.payment-icon-acombinar {
    margin-left: 10px;
    color: #2196F3;
}
</style>
