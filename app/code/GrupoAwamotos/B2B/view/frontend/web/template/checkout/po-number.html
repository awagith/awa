<!--
/**
 * PO Number Field Template for Checkout
 * P0-1: Campo para número de pedido de compra (Purchase Order)
 */
-->
<!-- ko if: isFieldVisible() -->
<div class="b2b-po-number-container checkout-block"
     data-bind="visible: isFieldVisible()">
    <div class="b2b-po-number-wrapper">
        <div class="field b2b-po-number-field">
            <label class="label" for="b2b-po-number">
                <span data-bind="text: getLabel()"></span>
                <span class="optional">(opcional)</span>
            </label>
            <div class="control">
                <input type="text"
                       id="b2b-po-number"
                       name="b2b_po_number"
                       class="input-text"
                       maxlength="100"
                       data-bind="
                           value: poNumber,
                           valueUpdate: 'afterkeydown',
                           attr: {
                               placeholder: getPlaceholder(),
                               'aria-label': getLabel()
                           }
                       " />
            </div>
            <div class="field-note">
                <span class="note" data-bind="text: getHelpText()"></span>
            </div>
        </div>
    </div>
</div>

<style>
    .b2b-po-number-container {
        margin-bottom: 20px;
        padding: 15px;
        background-color: var(--awa-bg-light, #f5f5f5);
        border-radius: var(--awa-radius-md, 8px);
        border: 1px solid var(--awa-border-light, #e0e0e0);
    }

    .b2b-po-number-wrapper .label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        color: var(--awa-text-primary, #333);
        margin-bottom: 8px;
    }

    .b2b-po-number-wrapper .label .optional {
        font-weight: 400;
        font-size: 0.85em;
        color: var(--awa-text-secondary, #666);
    }

    .b2b-po-number-wrapper .input-text {
        width: 100%;
        max-width: 350px;
        padding: 10px 12px;
        font-size: 14px;
        border: 1px solid var(--awa-border, #ccc);
        border-radius: var(--awa-radius-sm, 4px);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .b2b-po-number-wrapper .input-text:focus {
        border-color: var(--awa-red, #d00);
        box-shadow: 0 0 0 3px var(--awa-red-extra-light, rgb(221 0 0 / 10%));
        outline: none;
    }

    .b2b-po-number-wrapper .field-note {
        margin-top: 6px;
    }

    .b2b-po-number-wrapper .note {
        font-size: 12px;
        color: var(--awa-text-secondary, #666);
        line-height: 1.4;
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
        .b2b-po-number-container {
            background-color: var(--awa-bg-dark, #2a2a2a);
            border-color: var(--awa-border-dark, #444);
        }
    }

    /* Mobile responsiveness */
    @media (width <= 767px) {
        .b2b-po-number-container {
            padding: 12px;
            margin-bottom: 15px;
        }

        .b2b-po-number-wrapper .input-text {
            max-width: 100%;
        }
    }
</style>
<!-- /ko -->
