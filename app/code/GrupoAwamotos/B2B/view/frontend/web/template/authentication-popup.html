<div class="block-authentication"
     data-bind="afterRender: setModalElement, blockLoader: isLoading"
     style="display: none">
    <div class="wave-top">
        <div class="wave one"></div>
        <div class="wave two"></div>
        <div class="wave three"></div>
        <img class="logo" alt="AWA Motos" data-bind="attr: {src: window.logoUrl}" />
    </div>
    <div class="block block-customer-login"
         data-bind="attr: {'data-label': 'ou'}">
        <div class="block-title">
            <strong id="block-customer-login-heading"
                    role="heading"
                    aria-level="2">Acesse sua conta</strong>
        </div>
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <!-- ko foreach: getRegion('before') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!-- /ko -->
        <div class="block-content" aria-labelledby="block-customer-login-heading">
            <form class="form form-login"
                  method="post"
                  data-bind="event: {submit: login }"
                  id="login-form">
                <div class="fieldset login" data-bind="attr: {'data-hasrequired': '* Campos obrigat\u00f3rios'}">
                    <div class="field email required">
                        <label class="label" for="customer-email"><span>E-mail ou CNPJ</span></label>
                        <div class="control">
                            <input name="username"
                                   id="customer-email"
                                   type="text"
                                   class="input-text"
                                   data-mage-init='{"mage/trim-input":{}}'
                                   data-bind="attr: {autocomplete: autocomplete}"
                                   data-validate="{required:true}"
                                   placeholder="E-mail ou CNPJ">
                        </div>
                    </div>
                    <div class="field password required">
                        <label for="pass" class="label"><span>Senha</span></label>
                        <div class="control">
                            <input name="password"
                                   type="password"
                                   class="input-text"
                                   id="pass"
                                   data-bind="attr: {autocomplete: autocomplete}"
                                   data-validate="{required:true}"
                                   placeholder="Senha">
                        </div>
                        <a class="action"
                           data-bind="attr: {href: (window.authenticationPopup && window.authenticationPopup.awaB2bForgotPasswordUrl) || ((window.BASE_URL || '/') + 'b2b/account/forgotpassword/')}">
                            <span>Esqueceu sua senha?</span>
                        </a>
                    </div>
                    <!-- ko foreach: getRegion('additional-login-form-fields') -->
                    <!-- ko template: getTemplate() --><!-- /ko -->
                    <!-- /ko -->
                    <div class="actions-toolbar">
                        <input name="context" type="hidden" value="checkout" />
                        <div class="primary">
                            <button type="submit" class="action action-login secondary" name="send" id="send2">
                                <span>ENTRAR</span>
                            </button>
                        </div>
                        <a class="action-register"
                           data-bind="attr: {href: (window.authenticationPopup && window.authenticationPopup.awaB2bRegisterUrl) || ((window.BASE_URL || '/') + 'b2b/register/')}">
                            <span>Cadastre-se como empresa</span>
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
